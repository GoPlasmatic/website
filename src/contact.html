<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Contact – Plasmatic</title>

        <link rel="stylesheet" href="https://use.typekit.net/eef1zhq.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=DM+Sans:wght@300;400;500;700&family=DM+Mono&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles/common.css" />
        <link rel="stylesheet" href="styles/contact.css" />

        <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
        <script defer src="js/common.js"></script>
        <script type="importmap">
            {
                "imports": {
                    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
                    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
                }
            }
        </script>
        <script type="module" src="js/section-graphic.js"></script>
        <script defer src="js/contact.js"></script>
    </head>
    <body>
        <site-nav active="contact"></site-nav>

        <!-- CONTACT ─────────────────────────────────────────────────── -->
        <section class="section-contact" data-test-section="main">
            <section-graphic
                svg="assets/logo.svg"
                position="background"
                color-source="svg"
                line-mode="outline"
                num-lines="120"
                extrude-depth="1.0"
                object-offset="6.5,0"
                rotation="0,0,0"
                tilt="10,6,0.05"
                parallax="0.5,0.2,0.05"
            ></section-graphic>
            <div class="section-container">
                <div class="grid-2col contact-grid">
                    <div class="reveal-left">
                        <div class="eyebrow">
                            <span>Get in touch</span>
                        </div>
                        <h1 class="reveal-blur">
                            Let's talk about
                            <span class="gradient-text">your systems.</span>
                        </h1>
                        <p class="section-body">
                            Tell us about what you're building. We'll get back
                            to you within a couple of business days.
                        </p>
                        <div class="contact-direct">
                            <a
                                href="mailto:enquiries@goplasmatic.io"
                                class="contact-direct-link"
                            >
                                <i data-lucide="mail"></i>
                                <span>enquiries@goplasmatic.io</span>
                            </a>
                        </div>
                    </div>
                    <div class="reveal-right">
                        <form
                            id="contactForm"
                            class="card card-elevated contact-form"
                            action="https://formspree.io/f/movnyqor"
                            method="POST"
                        >
                            <div class="form-row">
                                <label for="contact-name">Name</label>
                                <input
                                    type="text"
                                    id="contact-name"
                                    name="name"
                                    required
                                    autocomplete="name"
                                />
                            </div>
                            <div class="form-row">
                                <label for="contact-email">Email</label>
                                <input
                                    type="email"
                                    id="contact-email"
                                    name="email"
                                    required
                                    autocomplete="email"
                                />
                            </div>
                            <div class="form-row">
                                <label for="contact-company">Company</label>
                                <input
                                    type="text"
                                    id="contact-company"
                                    name="company"
                                    autocomplete="organization"
                                />
                            </div>
                            <div class="form-row">
                                <label for="contact-message">Message</label>
                                <textarea
                                    id="contact-message"
                                    name="message"
                                    rows="5"
                                    required
                                ></textarea>
                            </div>
                            <button
                                type="submit"
                                class="btn-primary contact-submit"
                            >
                                Send message &rarr;
                            </button>
                            <p class="contact-status" id="contactStatus" role="status" aria-live="polite"></p>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <site-footer></site-footer>
    </body>
</html>
