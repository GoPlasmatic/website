<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <title>Plasmatic – Systems for modern software</title>
        <meta
            name="description"
            content="Plasmatic builds declarative runtimes that decouple, execute, and govern business logic in modern software — change rules instantly, without redeploying."
        />
        <meta name="theme-color" content="#07111A" />
        <link rel="canonical" href="https://goplasmatic.io/" />

        <!-- Open Graph / Twitter (per-route values kept in sync by usePageMeta) -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="Plasmatic" />
        <meta property="og:title" content="Plasmatic – Systems for modern software" />
        <meta
            property="og:description"
            content="Declarative runtimes that decouple, execute, and govern business logic in modern software."
        />
        <meta property="og:url" content="https://goplasmatic.io/" />
        <meta property="og:image" content="https://goplasmatic.io/og-image.png" />
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Plasmatic – Systems for modern software" />
        <meta
            name="twitter:description"
            content="Declarative runtimes that decouple, execute, and govern business logic in modern software."
        />
        <meta name="twitter:image" content="https://goplasmatic.io/og-image.png" />

        <!-- Organization + WebSite structured data -->
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@graph": [
                    {
                        "@type": "Organization",
                        "@id": "https://goplasmatic.io/#organization",
                        "name": "Plasmatic",
                        "url": "https://goplasmatic.io/",
                        "logo": "https://goplasmatic.io/favicon.svg",
                        "sameAs": ["https://github.com/GoPlasmatic"]
                    },
                    {
                        "@type": "WebSite",
                        "@id": "https://goplasmatic.io/#website",
                        "url": "https://goplasmatic.io/",
                        "name": "Plasmatic",
                        "publisher": { "@id": "https://goplasmatic.io/#organization" }
                    }
                ]
            }
        </script>

        <link rel="stylesheet" href="https://use.typekit.net/eef1zhq.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=DM+Sans:wght@300;400;500;700&family=DM+Mono&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
